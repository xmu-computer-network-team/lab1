name: Build Windows Executables

on:
  push:
    branches: [main, master]
    paths:
      - '**/*.py'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build encode.exe
        run: |
          pyinstaller --onedir `
            --name encode `
            --hidden-import=encoder.file_splitter `
            --hidden-import=encoder.frame_builder `
            --hidden-import=encoder.video_writer `
            --hidden-import=common.config `
            --hidden-import=common.crc `
            --distpath dist `
            encode.py

      - name: Build decode.exe
        run: |
          pyinstaller --onedir `
            --name decode `
            --hidden-import=decoder.frame_reader `
            --hidden-import=decoder.locator `
            --hidden-import=decoder.frame_assembler `
            --hidden-import=common.config `
            --hidden-import=common.crc `
            --distpath dist `
            decode.py

      - name: Copy pyzbar module and DLLs to decode _internal
        run: |
          $pyzbarPath = python -c "import pyzbar; import os; print(os.path.dirname(pyzbar.__file__))"
          Write-Host "pyzbar location: $pyzbarPath"
          
          # 列出 pyzbar 目录中的所有文件
          Get-ChildItem -Path $pyzbarPath -Recurse | Write-Host
          
          # 复制整个 pyzbar 目录
          Copy-Item -Recurse $pyzbarPath dist/decode/_internal/pyzbar
          
          # 复制所有 DLL 文件到 _internal 根目录
          $dllFiles = Get-ChildItem -Path $pyzbarPath -Filter "*.dll" -Recurse
          foreach ($dll in $dllFiles) {
            Copy-Item $dll.FullName dist/decode/_internal/
            Write-Host "Copied DLL: $($dll.Name)"
          }
          
          # 复制 MSVC runtime DLLs（libzbar 依赖）
          $system32 = "C:\Windows\System32"
          $msvcDlls = @("msvcp140.dll", "vcruntime140.dll", "vcruntime140_1.dll")
          foreach ($dll in $msvcDlls) {
            $src = Join-Path $system32 $dll
            if (Test-Path $src) {
              Copy-Item $src dist/decode/_internal/
              Write-Host "Copied $dll"
            }
          }

      - name: Prepare bin directory
        run: |
          New-Item -ItemType Directory -Force -Path bin/encode
          New-Item -ItemType Directory -Force -Path bin/decode
          # encode.exe 及其依赖
          Copy-Item dist/encode/encode.exe bin/encode/
          Copy-Item -Recurse dist/encode/_internal bin/encode/
          # decode.exe 及其依赖（包含 pyzbar DLL）
          Copy-Item dist/decode/decode.exe bin/decode/
          Copy-Item -Recurse dist/decode/_internal bin/decode/

      - name: Create bin.zip
        run: |
          Compress-Archive -Path bin/* -DestinationPath bin.zip

      - name: Upload bin.zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-zip
          path: bin.zip
          retention-days: 30

      - name: Upload individual executables
        uses: actions/upload-artifact@v4
        with:
          name: executables
          path: dist/
          retention-days: 30
